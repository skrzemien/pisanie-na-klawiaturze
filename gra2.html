<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistrz Klawiatury: Wyścig</title>
    <!-- Tailwind CSS do nowoczesnego stylizowania -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter dla interfejsu i JetBrains Mono dla czytelnego tekstu -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
            /* Zapewnienie bardzo czytelnego odstępu między wierszami i literami */
            line-height: 1.8;
            letter-spacing: 0.02em;
        }

        /* Style dla poszczególnych stanów znaków */
        .char {
            transition: color 0.15s ease, background-color 0.15s ease;
            border-radius: 0.2rem;
            padding: 0.1rem 0;
        }
        
        .char.untyped {
            color: #94a3b8; /* Jasnoszary */
        }
        
        .char.correct {
            color: #10b981; /* Zielony */
        }
        
        .char.incorrect {
            color: #ef4444; /* Czerwony */
            background-color: #fee2e2; /* Jasnoczerwone tło dla lepszej widoczności błędu */
        }
        
        .char.cursor {
            color: #1e293b; /* Ciemnoszary dla bieżącej litery */
            border-bottom: 3px solid #3b82f6; /* Niebieska linia pod literą */
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: #3b82f6; }
            50% { border-color: transparent; }
        }

        /* Ukrycie paska przewijania, jeśli tekst jest długi */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 selection:bg-transparent text-slate-800">

    <!-- Główny kontener gry -->
    <main class="w-full max-w-5xl bg-white rounded-3xl shadow-xl p-8 md:p-12 relative overflow-hidden">
        
        <!-- Nagłówek -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2">
                Mistrz Klawiatury: <span class="text-blue-600">Wyścig</span>
            </h1>
            <p class="text-slate-500 font-medium">Zacznij pisać, aby rozpocząć. Musisz poprawić błąd (Backspace), aby jechać dalej!</p>
        </header>

        <!-- Tor i samochód (Pasek postępu) -->
        <div class="relative w-full h-4 bg-slate-200 rounded-full mt-8 mb-16">
            <div id="progress-fill" class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-400 to-blue-600 rounded-full transition-all duration-200 ease-out" style="width: 0%"></div>
            <div id="car" class="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 transition-all duration-200 ease-out text-4xl drop-shadow-md z-10" style="left: 0%">
                🏎️
            </div>
        </div>

        <!-- Kontener na tekst -->
        <div class="bg-slate-50 p-8 rounded-2xl border border-slate-100 shadow-inner min-h-[200px] flex items-center relative">
            <div id="text-display" class="mono-text text-2xl md:text-[28px] break-words w-full">
                <!-- Tekst będzie generowany tutaj przez JavaScript -->
            </div>
            
            <!-- Widoczna podpowiedź o błędzie -->
            <div id="error-tooltip" class="absolute -top-12 left-1/2 -translate-x-1/2 bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg opacity-0 transition-opacity duration-200 pointer-events-none">
                Wciśnij Backspace, aby poprawić!
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 border-4 border-transparent border-t-red-500"></div>
            </div>
        </div>
        
        <!-- Niewidoczne pole wejściowe wspierające mobilne klawiatury (choć gra polega na fizycznej klawiaturze) -->
        <input type="text" id="hidden-input" class="absolute w-0 h-0 opacity-0 top-0 left-0" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

        <!-- Statystyki na żywo (opcjonalnie) -->
        <div class="mt-8 flex justify-center gap-8 text-slate-400 text-sm font-semibold uppercase tracking-wider hidden" id="live-stats">
            <div id="live-wpm">0 WPM</div>
            <div id="live-acc">100% Dokładność</div>
        </div>
    </main>

    <!-- Modal podsumowania (domyślnie ukryty) -->
    <div id="summary-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full mx-4 transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="text-center mb-8">
                <div class="text-6xl mb-4">🏁</div>
                <h2 class="text-3xl font-extrabold text-slate-800">Meta osiągnięta!</h2>
                <p class="text-slate-500 mt-2 font-medium">Świetna robota. Oto Twoje wyniki:</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-blue-50 p-5 rounded-2xl text-center border border-blue-100">
                    <p class="text-xs text-blue-600 font-bold uppercase tracking-wider mb-1">Prędkość</p>
                    <p class="text-4xl font-black text-blue-700"><span id="wpm-result">0</span> <span class="text-lg font-bold">WPM</span></p>
                </div>
                <div class="bg-emerald-50 p-5 rounded-2xl text-center border border-emerald-100">
                    <p class="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-1">Dokładność</p>
                    <p class="text-4xl font-black text-emerald-700"><span id="accuracy-result">0</span><span class="text-2xl">%</span></p>
                </div>
                <div class="bg-amber-50 p-5 rounded-2xl text-center col-span-2 border border-amber-100">
                    <p class="text-xs text-amber-600 font-bold uppercase tracking-wider mb-1">Czas gry</p>
                    <p class="text-4xl font-black text-amber-700"><span id="time-result">0.0</span><span class="text-2xl text-amber-600/70">s</span></p>
                </div>
            </div>
            
            <button onclick="initGame()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-8 rounded-xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2 text-lg">
                <span>Graj ponownie</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Baza ciekawostek w języku polskim
        const textDatabase = [
            "Kameleon potrafi poruszać każdym okiem niezależnie, co pozwala mu na obserwację otoczenia w 360 stopniach bez ruszania głową. Dodatkowo jego język jest dwukrotnie dłuższy od ciała.",
            "Język płetwala błękitnego jest tak ogromny, że waży tyle samo co dorosły słoń afrykański, a w jego paszczy zmieściłoby się stu ludzi. To największe znane zwierzę w historii Ziemi.",
            "Pszczoły komunikują się ze sobą za pomocą specjalnego tańca, którym przekazują informacje o kierunku i odległości do źródła nektaru. Potrafią też rozpoznawać ludzkie twarze.",
            "Ośmiornice to niezwykle inteligentne stworzenia. Posiadają aż trzy serca, a ich krew ma kolor niebieski dzięki wysokiej zawartości miedzi, która pomaga transportować tlen w zimnej wodzie.",
            "Gepardy to najszybsze zwierzęta lądowe na świecie, potrafią osiągnąć prędkość ponad 100 kilometrów na godzinę w zaledwie kilka sekund. Podczas biegu spędzają więcej czasu w powietrzu niż na ziemi."
        ];

        // Zmienne stanu gry
        let currentText = "";
        let currentIndex = 0;
        let hasError = false;
        let startTime = null;
        let mistakes = 0;
        let totalKeystrokes = 0;
        let isFinished = false;

        // Elementy DOM
        const textDisplay = document.getElementById('text-display');
        const car = document.getElementById('car');
        const progressFill = document.getElementById('progress-fill');
        const modal = document.getElementById('summary-modal');
        const modalContent = document.getElementById('modal-content');
        const errorTooltip = document.getElementById('error-tooltip');
        const hiddenInput = document.getElementById('hidden-input');

        // Inicjalizacja lub restart gry
        function initGame() {
            // Ukryj modal jeśli był otwarty
            modal.classList.remove('opacity-100', 'pointer-events-auto');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            errorTooltip.classList.remove('opacity-100');

            // Losowanie nowego tekstu (innego niż poprzedni, jeśli to możliwe)
            let newText = currentText;
            while(newText === currentText && textDatabase.length > 1) {
                newText = textDatabase[Math.floor(Math.random() * textDatabase.length)];
            }
            currentText = newText;

            // Reset stanu
            currentIndex = 0;
            hasError = false;
            startTime = null;
            mistakes = 0;
            totalKeystrokes = 0;
            isFinished = false;

            // Renderowanie widoku
            renderText();
            updateProgress();
            
            // Ustawienie focusu
            hiddenInput.focus();
            document.addEventListener('click', () => hiddenInput.focus());
        }

        // Renderowanie znaków w kontenerze
        function renderText() {
            textDisplay.innerHTML = '';
            for (let i = 0; i < currentText.length; i++) {
                const span = document.createElement('span');
                span.textContent = currentText[i];
                span.classList.add('char');
                span.id = `char-${i}`;
                
                if (i === 0) {
                    span.classList.add('cursor');
                } else {
                    span.classList.add('untyped');
                }
                
                textDisplay.appendChild(span);
            }
        }

        // Optymalizowana aktualizacja pojedynczego znaku
        function updateCharState(index, state) {
            const span = document.getElementById(`char-${index}`);
            if (!span) return;
            
            span.className = 'char'; // Reset klas
            if (state === 'correct') span.classList.add('correct');
            else if (state === 'incorrect') span.classList.add('incorrect');
            else if (state === 'cursor') span.classList.add('cursor');
            else span.classList.add('untyped');
        }

        // Aktualizacja paska postępu z animacją samochodu
        function updateProgress() {
            const percentage = currentText.length > 0 ? (currentIndex / currentText.length) * 100 : 0;
            car.style.left = `${percentage}%`;
            progressFill.style.width = `${percentage}%`;
        }

        // Kończenie gry i wyświetlanie statystyk
        function endGame() {
            isFinished = true;
            const endTime = Date.now();
            const timeInSeconds = (endTime - startTime) / 1000;
            const timeInMinutes = timeInSeconds / 60;

            // Kalkulacja WPM (Words Per Minute) - standardowo przyjmuje się 5 znaków jako słowo
            const words = currentText.length / 5;
            const wpm = Math.max(0, Math.round(words / timeInMinutes));

            // Kalkulacja dokładności na podstawie wszystkich naciśnięć klawiszy
            const accuracy = totalKeystrokes > 0 
                ? Math.max(0, Math.round(((totalKeystrokes - mistakes) / totalKeystrokes) * 100))
                : 100;

            // Aktualizacja UI w modalu
            document.getElementById('wpm-result').textContent = wpm;
            document.getElementById('accuracy-result').textContent = accuracy;
            document.getElementById('time-result').textContent = timeInSeconds.toFixed(1);

            // Pokazanie modala
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100', 'pointer-events-auto');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        // Główny kontroler logiki wpisywania
        document.addEventListener('keydown', (e) => {
            if (isFinished) return;
            
            // Ignorowanie klawiszy funkcyjnych
            if (e.ctrlKey || e.metaKey || e.altKey) return;

            // Zapobieganie domyślnym akcjom dla spacji (przewijanie w dół) i backspace (cofanie strony)
            if (e.key === ' ' || e.key === 'Backspace') {
                e.preventDefault();
            }

            // --- OBSŁUGA POPRAWY BŁĘDU ---
            if (e.key === 'Backspace') {
                if (hasError) {
                    hasError = false;
                    errorTooltip.classList.remove('opacity-100');
                    updateCharState(currentIndex, 'cursor');
                }
                return; // Zgodnie z wytycznymi, nie pozwalamy cofać się po poprawnych literach
            }

            // --- OBSŁUGA PISANIA ---
            // Akceptujemy tylko pojedyncze znaki (odsiewa Shift, CapsLock, itp.)
            if (e.key.length === 1) {
                // Rozpoczęcie czasu gry przy pierwszym znaku
                if (!startTime) startTime = Date.now();
                
                totalKeystrokes++;

                // Jeśli gracz popełnił błąd, ignorujemy wszystkie wciśnięcia, dopóki nie użyje Backspace
                if (hasError) {
                    // Opcjonalnie: trzęsienie podpowiedzią, by zwrócić uwagę
                    errorTooltip.classList.remove('opacity-100');
                    void errorTooltip.offsetWidth; // Wymuszenie reflow dla restartu animacji
                    errorTooltip.classList.add('opacity-100');
                    return; 
                }

                // Sprawdzanie poprawności wpisanego znaku
                if (e.key === currentText[currentIndex]) {
                    // PRAWIDŁOWY ZNAK
                    updateCharState(currentIndex, 'correct');
                    currentIndex++;
                    updateProgress();

                    // Sprawdzenie czy to koniec tekstu
                    if (currentIndex === currentText.length) {
                        updateCharState(currentIndex - 1, 'correct'); // Usunięcie kursora z ostatniej litery
                        endGame();
                    } else {
                        // Przesunięcie kursora
                        updateCharState(currentIndex, 'cursor');
                    }
                } else {
                    // BŁĘDNY ZNAK
                    hasError = true;
                    mistakes++;
                    updateCharState(currentIndex, 'incorrect');
                    errorTooltip.classList.add('opacity-100');
                }
            }
        });

        // Start gry po załadowaniu
        window.addEventListener('DOMContentLoaded', initGame);

    </script>
</body>
</html>
